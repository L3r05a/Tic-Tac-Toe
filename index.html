<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

</head>

<body>

<div class="container">


    <div class="topBanner">

        <p>Tic Tac Toe</p>
        
    </div>


    <div>

        <button class="startButton">Re-Start</button>

    </div>


    <div class="boardGrid">

        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>

    </div>

<div class="statusDisplay">

    <p class="promptDisplay"></p>

    <form action="">

        <input type="text" 
            id="playerID"
            placeholder="">

        <button type="submit" 
                id="playerIDSubmit">submit</button>
    </form>

</div>

</div>




</body>
</html>
